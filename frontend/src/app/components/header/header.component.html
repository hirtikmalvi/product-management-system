<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="" routerLinkActive="active-link">
      Product Management
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarContent"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <!-- Left side -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/products']"
            routerLinkActive="active"
          >
            Products
          </a>
        </li>
      </ul>
      <div class="d-flex align-items-center text-dark">
        <span class="me-3" *ngIf="userLoginStatus">
          {{ email }} (<span class="h6">{{ role }}</span
          >)
        </span>
        <div *ngIf="!userLoginStatus">
          <button class="btn fw-semibold" [routerLink]="['auth', 'login']">
            Login
          </button>
          <button class="btn fw-semibold" [routerLink]="['auth', 'register']">
            Register
          </button>
        </div>
        <button
          class="btn btn-outline-primary btn-sm"
          *ngIf="userLoginStatus"
          (click)="logout()"
        >
          Logout
        </button>
      </div>
    </div>
  </div>
</nav>
