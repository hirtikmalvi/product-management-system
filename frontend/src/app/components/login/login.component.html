<div class="container mt-4 d-flex justify-content-center">
  <div class="col-md-6 col-lg-4">
    <h3>User Login</h3>

    <form [formGroup]="loginForm" (ngSubmit)="submitLoginForm()">
      <!-- EMAIL -->
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>

        <input
          id="email"
          formControlName="email"
          type="email"
          class="form-control"
          placeholder="Enter Email"
        />

        <small class="text-danger" *ngIf="hasControlError('email', 'required')">
          Email is required.
        </small>

        <small class="text-danger" *ngIf="hasControlError('email', 'email')">
          Invalid email format.
        </small>
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>

        <input
          id="password"
          formControlName="password"
          type="password"
          class="form-control"
          placeholder="Enter Password"
        />

        <small
          class="text-danger"
          *ngIf="hasControlError('password', 'required')"
        >
          Password is required.
        </small>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loginForm.invalid"
      >
        Login
      </button>
    </form>
  </div>
</div>
