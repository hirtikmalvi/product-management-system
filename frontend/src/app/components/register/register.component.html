<div class="container mt-4 d-flex justify-content-center">
  <div class="col-md-6 col-lg-4">
    <h3>Register User</h3>

    <form [formGroup]="registerForm" (ngSubmit)="submitRegisterForm()">
      <!-- NAME -->
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>

        <input
          id="name"
          formControlName="name"
          type="text"
          class="form-control"
          placeholder="Enter Full Name"
        />

        <small class="text-danger" *ngIf="hasControlError('name', 'required')">
          Name is required.
        </small>

        <small class="text-danger" *ngIf="hasControlError('name', 'maxlength')">
          Max length is 150.
        </small>
      </div>

      <!-- EMAIL -->
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>

        <input
          id="email"
          formControlName="email"
          type="email"
          class="form-control"
          placeholder="Enter Email"
        />

        <small class="text-danger" *ngIf="hasControlError('email', 'required')">
          Email is required.
        </small>

        <small class="text-danger" *ngIf="hasControlError('email', 'email')">
          Invalid email format.
        </small>
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>

        <input
          id="password"
          formControlName="password"
          type="password"
          class="form-control"
          placeholder="Enter Password"
        />

        <small
          class="text-danger"
          *ngIf="hasControlError('password', 'required')"
        >
          Password is required.
        </small>
      </div>

      <!-- ROLE -->
      <div class="mb-3">
        <label for="role" class="form-label">Role</label>

        <select id="role" class="form-select" formControlName="role">
          <option value="0">Select Role</option>
          <option value="Admin">Admin</option>
          <option value="User">User</option>
        </select>

        <small class="text-danger" *ngIf="hasControlError('role', 'required')">
          Role is required.
        </small>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="registerForm.invalid"
      >
        Register
      </button>
    </form>
  </div>
</div>
